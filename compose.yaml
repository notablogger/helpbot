services:
  localstack:
    image: 'localstack/localstack:4.12.0'
    environment:
      - 'AWS_ACCESS_KEY_ID=test'
      - 'AWS_SECRET_ACCESS_KEY=test'
      - 'AWS_DEFAULT_REGION=us-east-1'
      - 'SERVICES=s3'
      - 'HELPBOT_S3_BUCKET=helpbot-documents'
    ports:
      - '4566'
    volumes:
      - './helpbot-mcp-server/localstack/init-s3-bucket.sh:/etc/localstack/init/ready.d/init-s3-bucket.sh'
      - './helpbot-mcp-server/localstack/documents:/seed-documents'
  ollama:
    image: 'ollama/ollama:latest'
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - '11434'
  ollama-model-pull:
    image: 'ollama/ollama:latest'
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama"]
    command: ["pull", "embeddinggemma:latest"]
    environment:
      OLLAMA_HOST: http://ollama:11434
  pgvector:
    image: 'pgvector/pgvector:pg16'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    labels:
      - "org.springframework.boot.service-connection=postgres"
    ports:
      - '5432'

