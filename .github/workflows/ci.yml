name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Placeholder so Spring Boot can resolve ${OPENAI_API_KEY} and start the context.
  # Nothing in these test runs makes a real OpenAI call.
  OPENAI_API_KEY: test-placeholder

jobs:
  mcp-server:
    name: helpbot-mcp-server (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: helpbot-mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      # Testcontainers (LocalStack, pgvector, Ollama) run against the Docker daemon
      # that's preinstalled on ubuntu-latest runners — no extra setup needed.
      - name: Build and test
        run: ./gradlew build

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-test-reports
          path: helpbot-mcp-server/build/reports/tests/test/
          retention-days: 7

  agent:
    name: helpbot-agent (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: helpbot-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      # `test` is intentionally excluded here: HelpbotAgentApplicationTests is a plain
      # @SpringBootTest, and Spring AI's MCP client connects to the configured MCP
      # server URL synchronously during context startup — it fails hard, not lazily,
      # when that server isn't reachable (see spring-projects/spring-ai#3232). This
      # job doesn't run helpbot-mcp-server, so the test can't pass as written.
      # compileTestJava still catches compile-time breakage in the test sources.
      - name: Compile and assemble
        run: ./gradlew build -x test compileTestJava

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-test-reports
          path: helpbot-agent/build/reports/tests/test/
          retention-days: 7
